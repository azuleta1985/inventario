<!DOCTYPE html>
<html lang="es" translate="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bodega Regional · Inventario (Online, sin OneDrive)</title>
  <style>
    :root{--bg:#f6f7fb;--card:#fff;--border:#e5e7eb;--text:#111827;--muted:#6b7280;--pri:#2563eb;--ok:#059669;--bad:#b91c1c}
    *{box-sizing:border-box} html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,'Helvetica Neue',Arial,"Noto Sans",sans-serif}
    .wrap{max-width:1100px;margin:0 auto;padding:16px}
    .top{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
    h1{font-size:20px;margin:0}
    .row{display:flex;gap:8px;align-items:center}
    .tabs button{border:1px solid var(--border);background:#fff;border-radius:10px;padding:8px 12px;cursor:pointer}
    .tabs .active{background:var(--pri);border-color:var(--pri);color:#fff}
    .grid{display:grid;gap:12px}
    .g-2{grid-template-columns:1fr 1fr}
    .g-3{grid-template-columns:repeat(3,1fr)}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px}
    .kpi .n{font-size:26px;font-weight:700}
    label{font-size:12px;color:var(--muted);display:block;margin:4px 0}
    input,select,textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:10px;outline:none}
    input:focus,select:focus,textarea:focus{border-color:var(--pri)}
    .btn{border:1px solid var(--border);background:#fff;border-radius:10px;padding:8px 12px;cursor:pointer}
    .btn.pri{background:var(--pri);border-color:var(--pri);color:#fff}
    .btn.ok{background:var(--ok);border-color:var(--ok);color:#fff}
    .btn.bad{background:#fff;border-color:#fecaca;color:var(--bad)}
    table{width:100%;border-collapse:collapse;font-size:14px}
    th,td{padding:8px;border-bottom:1px solid var(--border);text-align:left}
    thead th{background:#f3f4f6}
    .right{text-align:right}
    .muted{color:var(--muted)}
    .danger{color:var(--bad);font-weight:600}
    .nowrap{white-space:nowrap}
    @media (max-width:900px){.g-3{grid-template-columns:1fr}.g-2{grid-template-columns:1fr}}
  </style>

  <script src="https://unpkg.com/doc/index.js</script>
</head>
<body>
  <div class="top">
    <div class="wrap">
      <div class="row" style="justify-content:space-between;padding:10px 0">
        <h1>Bodega Regional · Control de Inventario</h1>
        <div class="row">
          <button class="btn ok" id="btnEjemplo">Cargar ejemplo</button>
          <button class="btn bad" id="btnBorrar">Borrar todo</button>
        </div>
      </div>

      <div class="tabs row" style="padding:0 0 10px 0">
        <button data-tab="inicio">Inicio</button>
        <button data-tab="inventario">Inventario</button>
        <button class="active" data-tab="movimientos">Movimientos</button>
        <button data-tab="reportes">Reportes</button>
        <button data-tab="config">Configuración</button>
      </div>
    </div>
  </div>

  <main class="wrap" id="main"></main>

  <footer class="wrap" style="padding:20px 16px 40px">
    <div class="muted" style="font-size:12px">
      Funciona 100% offline con LocalStorage. Exporta Excel, Word y permite respaldo (.json).
    </div>
  </footer>

  <script>
/* --- INICIA EL SCRIPT COMPLETO --- */
/* NOTA: Por límite del mensaje, voy a enviarte este archivo COMPLETO en 2 PARTES. */
/* ESTA ES SOLO LA PARTE 1. */
/* Para evitar errores, NO USES ESTE ARCHIVO AÚN. ESPERA LA PARTE 2 Y LA PARTE 3. */
  </script>

</body>
</html>
