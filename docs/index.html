<!DOCTYPE html>
<html lang="es" translate="no">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Bodega Regional · Inventario (Online)</title>

  <style>
    :root{--bg:#f6f7fb;--card:#fff;--border:#e5e7eb;--text:#111827;--muted:#6b7280;--pri:#2563eb;--ok:#059669;--bad:#b91c1c}
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,'Helvetica Neue',Arial,"Noto Sans",sans-serif}
    .wrap{max-width:1100px;margin:0 auto;padding:16px}
    .top{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
    h1{font-size:20px;margin:0}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .tabs button{border:1px solid var(--border);background:#fff;border-radius:10px;padding:8px 12px;cursor:pointer}
    .tabs .active{background:var(--pri);border-color:var(--pri);color:#fff}
    .grid{display:grid;gap:12px}
    .g-2{grid-template-columns:1fr 1fr}
    .g-3{grid-template-columns:repeat(3,1fr)}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px}
    .kpi .n{font-size:26px;font-weight:700}
    label{font-size:12px;color:var(--muted);display:block;margin:4px 0}
    input,select,textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:10px;outline:none}
    input:focus,select:focus,textarea:focus{border-color:var(--pri)}
    .btn{border:1px solid var(--border);background:#fff;border-radius:10px;padding:8px 12px;cursor:pointer}
    .btn.pri{background:var(--pri);border-color:var(--pri);color:#fff}
    .btn.ok{background:var(--ok);border-color:var(--ok);color:#fff}
    .btn.bad{background:#fff;border-color:#fecaca;color:var(--bad)}
    table{width:100%;border-collapse:collapse;font-size:14px}
    th,td{padding:8px;border-bottom:1px solid var(--border);text-align:left}
    thead th{background:#f3f4f6}
    .right{text-align:right}
    .muted{color:var(--muted)}
    .danger{color:var(--bad);font-weight:600}
    .nowrap{white-space:nowrap}
    @media (max-width:900px){.g-3{grid-template-columns:1fr}.g-2{grid-template-columns:1fr}}

    /* ===== Aviso flotante (toast) ===== */
    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      background: #065f46; /* verde éxito */
      color: #fff;
      padding: 10px 14px;
      border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0,0,0,.18);
      font-size: 14px;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease, transform .25s ease;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
    .toast.error { background: #b91c1c; } /* rojo error */
  </style>
</head>

<body>
  <div class="top">
    <div class="wrap">
      <div class="row" style="justify-content:space-between;padding:10px 0">
        <h1>Bodega Regional · Control de Inventario</h1>
        <div class="row">
          <button class="btn pri" id="btnSeedAll">Poner todos los ítems</button>
          <button class="btn ok" id="btnEjemplo">Cargar ejemplo</button>
          <button class="btn bad" id="btnBorrar">Borrar todo</button>
        </div>
      </div>
      <div class="tabs row" style="padding:0 0 10px 0">
        <button data-tab="inicio">Inicio</button>
        <button data-tab="inventario">Inventario</button>
        <button class="active" data-tab="movimientos">Movimientos</button>
        <button data-tab="reportes">Informes</button>
        <button data-tab="config">Configuración</button>
      </div>
    </div>
  </div>

  <main class="wrap" id="main"></main>

  <footer class="wrap" style="padding:20px 16px 40px">
    <div class="muted" style="font-size:12px">
      Funciona 100% offline (LocalStorage). Exporta CSV (Excel) y permite respaldo/transferencia (.json).
    </div>
  </footer>

  <!-- Contenedor del toast -->
  <div id="toast" class="toast" aria-live="polite"></div>

  <script>
  (function(){
    // ===== Helpers =====
    const $=(s,c=document)=>c.querySelector(s);
    const $$=(s,c=document)=>Array.from(c.querySelectorAll(s));
    const uid=()=>Math.random().toString(36).slice(2)+Date.now().toString(36);
    const todayISO=()=>{const d=new Date();d.setHours(0,0,0,0);return d.toISOString().slice(0,10)};
    const parseISO=s=>{const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d)};
    const startOfWeek=date=>{const d=new Date(date);const g=d.getDay();const diff=g===0?-6:1-g;d.setDate(d.getDate()+diff);d.setHours(0,0,0,0);return d};
    const endOfWeek=date=>{const s=startOfWeek(date);const e=new Date(s);e.setDate(s.getDate()+6);e.setHours(23,59,59,999);return e};
    const within=(dateStr,aStr,bStr)=>{const t=parseISO(dateStr).getTime();const a=aStr?parseISO(aStr).getTime():-Infinity;const b=bStr?parseISO(bStr).getTime()+24*3600*1000-1:Infinity;return t>=a&&t<=b};
    const load=(k,fb)=>{try{const x=localStorage.getItem(k);return x?JSON.parse(x):fb}catch{return fb}};
    const save=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
    const qs=(name)=>{ try{ return new URL(location.href).searchParams.get(name); } catch{ return null; } };
    const unique=(arr)=>Array.from(new Set(arr));

    // Toast reutilizable
    function showToast(msg, type='ok', ms=2200){
      const el = document.getElementById('toast');
      if(!el) return;
      el.textContent = msg;
      el.classList.remove('error');
      if(type==='error') el.classList.add('error');
      el.classList.add('show');
      clearTimeout(showToast.__t);
      showToast.__t = setTimeout(()=> el.classList.remove('show'), ms);
    }

    // ===== CSV: forzar columnas en Excel (sep=;) =====
    function downloadCSV(filename, rows, delimiter = ';'){
      const esc = (s) => {
        if (s == null) return "";
        const t = String(s).replace(/"/g, '""');
        // si hay ;, comillas, saltos o espacios extremos, encapsular
        return /["\r\n;]|^\s|\s$/.test(t) ? `"${t}"` : t;
      };
      const body = rows.map(r => r.map(c => esc(c)).join(delimiter)).join("\r\n");
      const content = `sep=${delimiter}\r\n` + body + "\r\n";
      const blob = new Blob(["\uFEFF" + content], { type: "text/csv;charset=utf-8;" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = filename.endsWith(".csv") ? filename : filename + ".csv";
      a.click();
      URL.revokeObjectURL(a.href);
    }

    // Backup encoder/decoder (por si algún día usas link con data)
    function encodeBackup(d){ const j=JSON.stringify(d); return btoa(unescape(encodeURIComponent(j))); }
    function decodeBackup(b){ try{ const j=decodeURIComponent(escape(atob(b))); return JSON.parse(j); }catch(e){ return null; } }

    const CATS=["Artículos de aseo","Equipamiento","Insumos de impresora","Insumos de desayuno","Artículos de oficina"];
    const DEST_TYPES=["Departamento","Jardín","Otro"];
    const LS={
      items:"inv_off_items_v1",
      moves:"inv_off_moves_v1",
      dests:"inv_off_dests_v1",
      officialDests:"inv_off_official_dests_v1"
    };

    let state={
      tab:"movimientos",
      items:load(LS.items,[]),
      moves:load(LS.moves,[]),
      dests:load(LS.dests,[]),
      buscar:"",catFiltro:"",
      itemForm:{id:null,code:"",name:"",category:"",unit:"Unidad",minStock:0,initialStock:0},
      moveForm:{id:null,date:todayISO(),type:"salida",itemId:"",qty:1,destType:"Departamento",dest:"",notes:""},
      fromDate:startOfWeek(new Date()).toISOString().slice(0,10),
      toDate:endOfWeek(new Date()).toISOString().slice(0,10)
    };

    function set(p){ state={...state,...p}; render(); persist(); }
    function persist(){ save(LS.items,state.items); save(LS.moves,state.moves); save(LS.dests,state.dests); }

    // Lista oficial de Jardines/Destinos
    function getOfficialDests(){ return load(LS.officialDests, []); }
    function setOfficialDests(list){ save(LS.officialDests, Array.from(new Set((list||[]).map(s=>String(s).trim()).filter(Boolean)))); }

    // Semillas de ítems base
    function seedItems(){
      return [
        { id: uid(), code:'IMP-103A',    name:'Tóner 103 A',  category:'Insumos de impresora', unit:'Unidad',  minStock:0, initialStock:0 },
        { id: uid(), code:'IMP-085A',    name:'Tóner 85 A',   category:'Insumos de impresora', unit:'Unidad',  minStock:0, initialStock:0 },
        { id: uid(), code:'EQP-TOL-001', name:'Toldo Completo', category:'Equipamiento',       unit:'Unidad',  minStock:0, initialStock:0 },
        { id: uid(), code:'ASE-BAS-5055',name:'Bolsa Basura 50x55x10 Unidades Paquete', category:'Artículos de aseo', unit:'Paquete', minStock:0, initialStock:0 },
        { id: uid(), code:'ASE-DET-800', name:'Detergente en Polvo 800 Grs',           category:'Artículos de aseo', unit:'Unidad',  minStock:0, initialStock:0 },
        { id: uid(), code:'ASE-DIS-JAB', name:'Dispensador Para Jabón Liquido',        category:'Artículos de aseo', unit:'Unidad',  minStock:0, initialStock:0 }
      ];
    }

    // Aplica ítems base y destinos (si hay OFICIAL, usa OFICIAL)
    function applySeed(){
      const official = getOfficialDests();
      state.items = seedItems();
      if(official.length>0){
        state.dests = unique([...(state.dests||[]), ...official]);
      }else{
        state.dests = unique([...(state.dests||[]), 'Bambi','Sol del Valle']);
      }
      persist();
    }

    // Semilla automática / forzar por URL
    (function seedOnLoad(){
      try{
        const force = (qs('seed') === '1');
        const isEmpty = !state.items || state.items.length===0;
        if (isEmpty || force){
          if (isEmpty){ applySeed(); }
        }
      }catch(e){}
    })();

    // ===== Utilidades cálculo/exports =====
    function stockByItem(){ const acc={}; for(const it of state.items) acc[it.id]=Number(it.initialStock||0);
      for(const mv of state.moves){ const m=mv.type==="entrada"?1:-1; acc[mv.itemId]=(acc[mv.itemId]||0)+m*Number(mv.qty||0); } return acc; }

    function exportInventario(){ const sb=stockByItem();
      const rows=[["Código","Artículo","Categoría","Unidad","Stock mínimo","Existencias"]];
      for(const it of state.items) rows.push([it.code||"",it.name,it.category,it.unit||"Unidad",Number(it.minStock||0),Number(sb[it.id]||0)]);
      downloadCSV(`inventario_${todayISO()}`,rows);
    }

    function exportMovimientos(){ const rows=[["Fecha","Tipo","Artículo","Categoría","Cantidad","Destino/Origen","Tipo destino","Notas"]];
      const itemsMap=Object.fromEntries(state.items.map(it=>[it.id,it]));
      const movs=state.moves.filter(m=>within(m.date,state.fromDate,state.toDate));
      for(const mv of movs){ const it=itemsMap[mv.itemId]; rows.push([mv.date,mv.type,it?it.name:"(Eliminado)",it?it.category:"",mv.qty,mv.dest||"",mv.destType||"",mv.notes||""]); }
      downloadCSV(`movimientos_${state.fromDate}_a_${state.toDate}`,rows);
    }

    function exportReporteSemanal(){ const itemsMap=Object.fromEntries(state.items.map(it=>[it.id,it]));
      const movs=state.moves.filter(m=>within(m.date,state.fromDate,state.toDate));
      const map=new Map();
      for(const mv of movs){
        const s=startOfWeek(parseISO(mv.date)).toISOString().slice(0,10);
        const e=endOfWeek(parseISO(mv.date)).toISOString().slice(0,10);
        const key=`${s}_${e}_${mv.dest||"-"}`;
        const it=itemsMap[mv.itemId];
        if(!map.has(key)) map.set(key,{s,e,dest:mv.dest||"-",in:0,out:0,det:[]});
        const n=map.get(key);
        if(mv.type==='entrada') n.in+=Number(mv.qty||0); else n.out+=Number(mv.qty||0);
        n.det.push({fecha:mv.date,tipo:mv.type,articulo:it?it.name:"(Eliminado)",cantidad:mv.qty});
      }
      const arr=Array.from(map.values()).sort((a,b)=> a.s.localeCompare(b.s) || (a.dest||'').localeCompare((b.dest||''),'es',{sensitivity:'base'}));
      const rows=[["Semana (Lun-Dom)","Destino","Entradas","Salidas","Detalle"]];
      for(const g of arr){
        rows.push([`${g.s} a ${g.e}`, g.dest, g.in, g.out, g.det.map(d=>`${d.articulo} | ${d.fecha} | ${d.tipo} | ${d.cantidad}`).join('; ')]);
      }
      downloadCSV(`reporte_semanal_${state.fromDate}_${state.toDate}`,rows);
    }

    // ===== UI =====
    function render(){
      const main=$("#main");
      const tabsHtml={
        inicio: `
          <section class="grid g-3">
            <div class="card kpi"><div class="muted">Ítems</div><div class="n">${state.items.length}</div></div>
            <div class="card kpi"><div class="muted">Movimientos</div><div class="n">${state.moves.length}</div></div>
            <div class="card kpi"><div class="muted">Destinos</div><div class="n">${state.dests.length}</div></div>
          </section>
        `,
        inventario: `
          <section class="grid g-2">
            <div class="card">
              <h3 style="margin:6px 0">Nuevo/editar ítem</h3>
              <div>
                <label>Código</label>
                <input id="it_code" value="${state.itemForm.code}" placeholder="SKU o interno"/>
                <label>Artículo *</label>
                <input id="it_name" value="${state.itemForm.name}" placeholder="Ej.: Papel higiénico"/>
                <label>Categoría *</label>
                <select id="it_cat">${['',...CATS].map(c=>`<option ${state.itemForm.category===c?'selected':''} value='${c}'>${c||'-- Seleccione --'}</option>`).join('')}</select>
                <label>Unidad</label>
                <input id="it_unit" value="${state.itemForm.unit}" placeholder="Unidad, Caja, Paquete, Kg"/>
                <div class="grid g-2">
                  <div><label>Stock mínimo</label><input id="it_min" type="number" value="${state.itemForm.minStock}"/></div>
                  <div><label>Stock inicial</label><input id="it_init" type="number" value="${state.itemForm.initialStock}"/></div>
                </div>
                <div class="row" style="gap:8px;margin-top:8px">
                  <button class="btn pri" id="btnSaveItem">Guardar</button>
                  <button class="btn" id="btnClearItem">Limpiar</button>
                </div>
              </div>
            </div>

            <div class="card">
              <div class="row" style="gap:8px;align-items:flex-end;margin-bottom:8px">
                <div style="flex:1">
                  <label>Buscar</label>
                  <input id="buscar" value="${state.buscar}" placeholder="Nombre, código, unidad"/>
                </div>
                <div style="width:220px">
                  <label>Categoría</label>
                  <select id="catFiltro">${['',...CATS].map(c=>`<option ${state.catFiltro===c?'selected':''} value='${c}'>${c||'Todas'}</option>`).join('')}</select>
                </div>
                <button class="btn ok" id="btnExpInv">Descargar Excel (CSV)</button>
              </div>

              <div class="row" style="gap:8px;align-items:center;flex-wrap:wrap;margin:8px 0">
                <select id="selRemoveItem" style="min-width:260px">
                  <option value="">-- Seleccione ítem a quitar --</option>
                </select>
                <button class="btn bad" id="btnRemoveOne">Quitar ítem</button>
                <button class="btn bad" id="btnRemoveAllItems">Quitar todos los ítems</button>
              </div>

              <div style="overflow-x:auto">
                <table>
                  <thead>
                    <tr>
                      <th>Código</th><th>Artículo</th><th>Categoría</th>
                      <th>Unidad</th><th>Mínimo</th><th>Existencias</th><th class='right'>Acciones</th>
                    </tr>
                  </thead>
                  <tbody id="inv_rows"></tbody>
                </table>
              </div>
            </div>
          </section>
        `,
        movimientos: `
          <section class="grid g-2">
            <div class="card">
              <h3 style="margin:6px 0">Registrar movimiento</h3>
              <label>Fecha *</label>
              <input id="mv_date" type="date" value="${state.moveForm.date}"/>
              <label>Tipo *</label>
              <select id="mv_type"><option ${state.moveForm.type==='entrada'?'selected':''} value="entrada">entrada</option><option ${state.moveForm.type==='salida'?'selected':''} value="salida">salida</option></select>
              <label>Artículo *</label>
              <select id="mv_item"><option value="">-- Seleccione --</option>${
                state.items.slice().sort((a,b)=>a.name.localeCompare(b.name,'es',{sensitivity:'base'}))
                .map(it=>`<option ${state.moveForm.itemId===it.id?'selected':''} value='${it.id}'>${it.name} · ${it.category}</option>`).join('')
              }</select>
              <label>Cantidad *</label>
              <input id="mv_qty" type="number" min="1" value="${state.moveForm.qty}"/>
              <div class="grid g-2">
                <div>
                  <label>Tipo de destino/origen</label>
                  <select id="mv_destType">${DEST_TYPES.map(t=>`<option ${state.moveForm.destType===t?'selected':''} value='${t}'>${t}</option>`).join('')}</select>
                </div>
                <div>
                  <label>Destino/Origen</label>
                  <input id="mv_dest" value="${state.moveForm.dest}" list="ls_dests" placeholder="Ej.: Jardín Las Flores"/>
                  <datalist id="ls_dests">${state.dests.slice().sort((a,b)=>a.localeCompare(b,'es',{sensitivity:'base'})).map(d=>`<option value='${d}'></option>`).join('')}</datalist>
                </div>
              </div>
              <label>Notas (opcional)</label>
              <input id="mv_notes" value="${state.moveForm.notes}"/>
              <div class="row" style="gap:8px;margin-top:8px">
                <button class="btn pri" id="btnSaveMove">Guardar</button>
                <button class="btn" id="btnClearMove">Limpiar</button>
              </div>
            </div>
            <div class="card">
              <div class="row" style="gap:8px;align-items:flex-end;margin-bottom:8px">
                <div style="width:200px"><label>Desde</label><input id="fromDate" type="date" value="${state.fromDate}"/></div>
                <div style="width:200px"><label>Hasta</label><input id="toDate" type="date" value="${state.toDate}"/></div>
                <button class="btn ok" id="btnExpMovs">Descargar Excel (CSV)</button>
                <button class="btn ok" id="btnWord">Comprobante (Word)</button>
              </div>
              <div style="overflow-x:auto">
                <table>
                  <thead><tr><th>Fecha</th><th>Tipo</th><th>Artículo</th><th>Categoría</th><th>Cantidad</th><th>Destino/Origen</th><th>Notas</th><th class='right'>Acciones</th></tr></thead>
                  <tbody>${
                    (()=>{
                      const itemsMap=Object.fromEntries(state.items.map(it=>[it.id,it]));
                      const list=state.moves.filter(m=>within(m.date,state.fromDate,state.toDate));
                      if(list.length===0) return `<tr><td colspan='8' class='muted' style='text-align:center;padding:16px'>Sin movimientos en el rango</td></tr>`;
                      return list.map(mv=>{
                        const it=itemsMap[mv.itemId];
                        return `<tr>
                          <td class='nowrap'>${mv.date}</td>
                          <td style='color:${mv.type==='entrada'?'#065f46':'#1e40af'}'>${mv.type}</td>
                          <td>${it?it.name:'(Eliminado)'}</td>
                          <td>${it?it.category:''}</td>
                          <td>${mv.qty}</td>
                          <td>${mv.dest||''}</td>
                          <td>${mv.notes||''}</td>
                          <td class='right'>
                            <button class='btn' data-edit-move='${mv.id}'>Editar</button>
                            <button class='btn bad' data-del-move='${mv.id}'>Eliminar</button>
                          </td>
                        </tr>`;
                      }).join('');
                    })()
                  }</tbody>
                </table>
              </div>
            </div>
          </section>
        `,
        reportes: `
          <section class="grid">
            <div class="card">
              <h3 style="margin:6px 0">Rango de fechas</h3>
              <div class="row" style="gap:8px;align-items:flex-end;margin-bottom:8px;flex-wrap:wrap">
                <div style="width:200px"><label>Desde</label><input id="fromDate" type="date" value="${state.fromDate}"/></div>
                <div style="width:200px"><label>Hasta</label><input id="toDate" type="date" value="${state.toDate}"/></div>
                <button class="btn" id="btnWeek">Semana actual</button>
              </div>

              <div class="row" style="gap:8px;flex-wrap:wrap;margin-bottom:8px">
                <button class="btn" id="tabRepSem">Por semana</button>
                <button class="btn pri" id="tabRepDest">Por Jardín/Destino</button>
                <button class="btn ok" id="btnExpRep">Descargar CSV (por semana)</button>
                <button class="btn ok" id="btnExpRepDest">Descargar CSV (por Destino)</button>
              </div>

              <div id="repContainer" style="overflow-x:auto"></div>
            </div>
          </section>
        `,
        config: `
          <section class="grid g-2">

            <div class="card">
              <h3 style="margin:6px 0">Acciones rápidas</h3>
              <div class="row" style="gap:8px;flex-wrap:wrap">
                <button class="btn pri" id="btnCfgSeedAll">Poner todos los ítems (semilla)</button>
                <button class="btn" id="btnBackup">Descargar respaldo (.json)</button>
                <label class="btn" style="cursor:pointer">Cargar respaldo
                  <input id="fileRestore" type="file" accept="application/json" style="display:none"/>
                </label>
              </div>
              <p class="muted" style="margin-top:6px">
                “Poner todos los ítems (semilla)” carga los artículos base en este dispositivo.
              </p>
            </div>

            <div class="card">
              <h3 style="margin:6px 0">Transferencia PC → Celular (archivo)</h3>
              <div class="row" style="gap:8px;flex-wrap:wrap">
                <button class="btn ok" id="btnMakeTransferFile">Crear archivo de transferencia (.json)</button>
                <label class="btn" style="cursor:pointer">Importar transferencia (.json)
                  <input id="fileTransferImport" type="file" accept="application/json" style="display:none"/>
                </label>
              </div>
              <ol class="muted" style="margin:8px 0 0 18px">
                <li>En PC, crea el archivo y envíalo al celular.</li>
                <li>En el celular, importa el archivo aquí.</li>
              </ol>
            </div>

            <div class="card" style="grid-column:1/-1">
              <h3 style="margin:6px 0">Lista oficial de Jardines/Destinos</h3>
              <p class="muted" style="margin:6px 0">
                Pega tu lista oficial (uno por línea). Guárdala como OFICIAL y aplícala en este u otros dispositivos.
              </p>
              <textarea id="txtOfficialDests" rows="8" style="width:100%;" placeholder="Ejemplo:
Jardín Bambi
Sol del Valle
Arcoíris
..."></textarea>
              <div class="row" style="gap:8px;flex-wrap:wrap;margin-top:8px">
                <button class="btn" id="btnOfficialLoadFromCurrent">Cargar desde destinos actuales</button>
                <button class="btn ok" id="btnOfficialSave">Guardar como OFICIAL</button>
                <button class="btn pri" id="btnOfficialApply">Aplicar OFICIAL en este dispositivo</button>
                <button class="btn" id="btnOfficialExportJSON">Descargar OFICIAL (.json)</button>
              </div>
              <p class="muted" style="margin-top:6px">
                Consejo: guarda la OFICIAL aquí, aplícala y luego usa “Crear archivo de transferencia” para clonarla en el celular.
              </p>
            </div>

            <div class="card">
              <h3 style="margin:6px 0">Categorías sugeridas</h3>
              <ul style="margin:6px 0 0 18px">${CATS.map(c=>`<li>${c}</li>`).join('')}</ul>
            </div>
          </section>
        `
      };

      $("#main").innerHTML = tabsHtml[state.tab];
      $$(".tabs button").forEach(b=>{ b.classList.toggle("active", b.dataset.tab===state.tab); b.onclick = ()=> set({tab: b.dataset.tab}); });

      // ===== Inventario =====
      if(state.tab==='inventario'){
        $("#buscar").oninput = (e)=>{ state.buscar = e.target.value; renderInventarioRows(); };
        $("#catFiltro").onchange = (e)=>{ state.catFiltro = e.target.value; renderInventarioRows(); };

        $("#btnExpInv").onclick = exportInventario;

        $("#btnSaveItem").onclick = ()=>{
          const f = {
            id: state.itemForm.id || uid(),
            code: $("#it_code").value.trim(),
            name: $("#it_name").value.trim(),
            category: $("#it_cat").value,
            unit: $("#it_unit").value.trim() || 'Unidad',
            minStock: Number($("#it_min").value || 0),
            initialStock: Number($("#it_init").value || 0)
          };
          if(!f.name || !f.category) return alert('Complete al menos Artículo y Categoría');

          let items=[...state.items];
          if(state.itemForm.id) items = items.map(it=> it.id===state.itemForm.id ? {...f} : it);
          else items = [f, ...items];

          set({items, itemForm:{id:null, code:'', name:'', category:'', unit:'Unidad', minStock:0, initialStock:0}});
        };

        $("#btnClearItem").onclick = ()=> set({itemForm:{id:null, code:'', name:'', category:'', unit:'Unidad', minStock:0, initialStock:0}});

        $("#btnRemoveOne").onclick = ()=>{
          const sel = $("#selRemoveItem");
          const id = (sel && sel.value) || '';
          if(!id) return alert('Selecciona un ítem a quitar');
          const it = state.items.find(x=>x.id===id);
          if(!it) return alert('Ítem no encontrado');
          if(!confirm(`¿Quitar el ítem "${it.name}"?`)) return;
          set({ items: state.items.filter(x=>x.id!==id) });
        };
        $("#btnRemoveAllItems").onclick = ()=>{
          if(!state.items.length) return alert('No hay ítems para quitar');
          if(!confirm('Esto quitará TODOS los ítems. Los movimientos quedarán y mostrarán "(Eliminado)". ¿Continuar?')) return;
          set({ items: [] });
        };

        fillRemoveSelector();
        renderInventarioRows();
      }

      // ===== Movimientos =====
      if(state.tab==='movimientos'){
        const syncLight=()=>{
          state.moveForm = {
            id: state.moveForm.id,
            date: $("#mv_date").value || todayISO(),
            type: $("#mv_type").value,
            itemId: $("#mv_item").value,
            qty: Number($("#mv_qty").value || 0),
            destType: $("#mv_destType").value,
            dest: $("#mv_dest").value,
            notes: $("#mv_notes").value
          };
        };
        const refreshForm=()=> set({ moveForm:{...state.moveForm} });

        $("#mv_date").onchange = ()=>{ syncLight(); refreshForm(); };
        $("#mv_type").onchange = ()=>{ syncLight(); refreshForm(); };
        $("#mv_item").onchange = ()=>{ syncLight(); refreshForm(); };
        $("#mv_destType").onchange = ()=>{ syncLight(); refreshForm(); };
        $("#mv_dest").oninput = syncLight; $("#mv_notes").oninput = syncLight;
        $("#mv_qty").onchange = ()=>{ syncLight(); refreshForm(); };

        $("#fromDate").onchange = e=> set({fromDate:e.target.value});
        $("#toDate").onchange = e=> set({toDate:e.target.value});

        $("#btnExpMovs").onclick = exportMovimientos;

        const btnSaveMove = document.getElementById('btnSaveMove');
        if(btnSaveMove){
          btnSaveMove.onclick = ()=>{
            const f = {
              id: state.moveForm.id,
              date: document.getElementById('mv_date')?.value || '',
              type: document.getElementById('mv_type')?.value || '',
              itemId: document.getElementById('mv_item')?.value || '',
              qty: Number(document.getElementById('mv_qty')?.value || 0),
              destType: document.getElementById('mv_destType')?.value || 'Departamento',
              dest: (document.getElementById('mv_dest')?.value || '').trim(),
              notes: (document.getElementById('mv_notes')?.value || '').trim()
            };

            if(!f.date || !f.type || !f.itemId){
              showToast('Completa Fecha, Tipo y Artículo', 'error', 2600);
              return;
            }
            if(f.qty<=0){
              showToast('La cantidad debe ser mayor a 0', 'error', 2600);
              return;
            }

            const newMv = {
              id: f.id || uid(),
              date: f.date,
              type: f.type,
              itemId: f.itemId,
              qty: f.qty,
              destType: f.destType,
              dest: f.dest,
              notes: f.notes
            };

            let moves = [...state.moves];
            if(f.id){
              moves = moves.map(m => m.id===f.id ? newMv : m);
            }else{
              moves = [newMv, ...moves];
            }

            const dests = newMv.dest ? Array.from(new Set([newMv.dest, ...state.dests])).slice(0,200) : state.dests;

            const cleanForm = {
              id:null,
              date: todayISO(),
              type: 'salida',
              itemId: '',
              qty: 1,
              destType: 'Departamento',
              dest: '',
              notes: ''
            };

            set({ moves, dests, moveForm: cleanForm });
            showToast('Movimiento guardado exitosamente', 'ok', 2200);
          };
        }

        // Editar/Eliminar por fila
        document.querySelectorAll("[data-edit-move]").forEach(btn=>{
          btn.onclick = ()=>{
            const mv = state.moves.find(x=>x.id===btn.dataset.editMove);
            if(!mv) return;
            set({ moveForm:{...mv} });
          };
        });
        document.querySelectorAll("[data-del-move]").forEach(btn=>{
          btn.onclick = ()=>{
            if(!confirm("¿Eliminar movimiento?")) return;
            const id = btn.dataset.delMove;
            set({ moves: state.moves.filter(m=>m.id!==id) });
            showToast('Movimiento eliminado', 'ok', 1800);
          };
        });
      }

      // ===== Informes =====
      if(state.tab==='reportes'){
        const itemsMap = Object.fromEntries(state.items.map(it=>[it.id,it]));
        const movsInRange = () => state.moves.filter(m=>within(m.date, state.fromDate, state.toDate));

        function buildTableSemanal(){
          const movs = movsInRange();
          const map = new Map();
          for (const mv of movs){
            const s = (startOfWeek(parseISO(mv.date))).toISOString().slice(0,10);
            const e = (endOfWeek(parseISO(mv.date))).toISOString().slice(0,10);
            const key = `${s}_${e}_${mv.dest||'-'}`;
            const it = itemsMap[mv.itemId];
            if(!map.has(key)) map.set(key,{s,e,dest:mv.dest||'-',in:0,out:0,det:[]});
            const n = map.get(key);
            if(mv.type==='entrada') n.in+=Number(mv.qty||0); else n.out+=Number(mv.qty||0);
            n.det.push({fecha:mv.date,tipo:mv.type,articulo:it?it.name:'(Eliminado)',cantidad:mv.qty});
          }
          const arr = Array.from(map.values()).sort((a,b)=> a.s.localeCompare(b.s) || (a.dest||'').localeCompare((b.dest||''),'es',{sensitivity:'base'}));

          if(arr.length===0){
            return `<p class="muted" style="padding:16px">No hay datos en el rango</p>`;
          }
          return `
            <table>
              <thead><tr><th>Semana (Lun-Dom)</th><th>Destino</th><th>Entradas</th><th>Salidas</th><th>Detalle</th></tr></thead>
              <tbody>
                ${arr.map(g=>`
                  <tr>
                    <td class="nowrap">${g.s} a ${g.e}</td>
                    <td>${g.dest}</td>
                    <td>${g.in}</td>
                    <td>${g.out}</td>
                    <td>
                      <ul style="margin:0 0 0 18px">
                        ${g.det.map(d=>`<li>${d.articulo} · ${d.fecha} · ${d.tipo} · ${d.cantidad}</li>`).join('')}
                      </ul>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          `;
        }

        function buildTablePorDestino(){
          const movs = movsInRange();
          if(movs.length===0) return `<p class="muted" style="padding:16px">No hay movimientos en el rango seleccionado.</p>`;

          const map = new Map(); // dest -> {in,out,det[]}
          for(const mv of movs){
            const dest = mv.dest && mv.dest.trim() ? mv.dest.trim() : '(Sin destino)';
            if(!map.has(dest)) map.set(dest, {dest, in:0, out:0, det:[]});
            const g = map.get(dest);
            if(mv.type==='entrada') g.in += Number(mv.qty||0); else g.out += Number(mv.qty||0);
            const it = itemsMap[mv.itemId];
            g.det.push({
              fecha: mv.date,
              tipo: mv.type,
              articulo: it?it.name:'(Eliminado)',
              categoria: it?it.category:'',
              cantidad: mv.qty
            });
          }

          const arr = Array.from(map.values())
            .sort((a,b)=> (a.dest||'').localeCompare((b.dest||''),'es',{sensitivity:'base'}));

          let html = `
            <table>
              <thead>
                <tr>
                  <th>Jardín/Destino</th>
                  <th>Entradas</th>
                  <th>Salidas</th>
                  <th>Detalle</th>
                </tr>
              </thead>
              <tbody>
          `;
          for(const g of arr){
            const detalle = g.det
              .sort((a,b)=> a.fecha.localeCompare(b.fecha) || a.articulo.localeCompare(b.articulo,'es',{sensitivity:'base'}))
              .map(d=>`${d.fecha} · ${d.tipo} · ${d.articulo} (${d.categoria||'-'}) · ${d.cantidad}`)
              .join('; ');
            html += `
              <tr>
                <td>${g.dest}</td>
                <td>${g.in}</td>
                <td>${g.out}</td>
                <td>${detalle || '-'}</td>
              </tr>
            `;
          }
          html += `</tbody></table>`;
          return html;
        }

        const repContainer = document.getElementById('repContainer');
        const btnSem = document.getElementById('tabRepSem');
        const btnDest = document.getElementById('tabRepDest');
        function setActive(btn){ [btnSem,btnDest].forEach(b=>b && b.classList.remove('pri')); btn && btn.classList.add('pri'); }

        if(repContainer){ repContainer.innerHTML = buildTablePorDestino(); setActive(btnDest); }

        document.getElementById('fromDate').onchange = e=>{ state.fromDate=e.target.value; repContainer.innerHTML = buildTablePorDestino(); setActive(btnDest); };
        document.getElementById('toDate').onchange   = e=>{ state.toDate=e.target.value; repContainer.innerHTML = buildTablePorDestino(); setActive(btnDest); };
        document.getElementById('btnWeek').onclick   = ()=>{ state.fromDate=startOfWeek(new Date()).toISOString().slice(0,10); state.toDate=endOfWeek(new Date()).toISOString().slice(0,10); repContainer.innerHTML = buildTablePorDestino(); setActive(btnDest); };

        btnSem && (btnSem.onclick = ()=>{ repContainer.innerHTML = buildTableSemanal(); setActive(btnSem); });
        btnDest && (btnDest.onclick = ()=>{ repContainer.innerHTML = buildTablePorDestino(); setActive(btnDest); });

        document.getElementById('btnExpRep').onclick = ()=> exportReporteSemanal();

        document.getElementById('btnExpRepDest').onclick = ()=>{
          const movs = movsInRange();
          const map = new Map();
          for(const mv of movs){
            const dest = mv.dest && mv.dest.trim() ? mv.dest.trim() : '(Sin destino)';
            if(!map.has(dest)) map.set(dest,{dest,in:0,out:0,det:[]});
            const g = map.get(dest);
            if(mv.type==='entrada') g.in+=Number(mv.qty||0); else g.out+=Number(mv.qty||0);
            const it = itemsMap[mv.itemId];
            g.det.push({fecha:mv.date,tipo:mv.type,articulo:it?it.name:'(Eliminado)',categoria:it?it.category:'',cantidad:mv.qty});
          }
          const arr = Array.from(map.values()).sort((a,b)=> (a.dest||'').localeCompare((b.dest||''),'es',{sensitivity:'base'}));
          const rows = [["Jardín/Destino","Entradas","Salidas","Detalle (fecha · tipo · artículo (categoría) · cantidad)"]];
          for(const g of arr){
            const detalle = g.det
              .sort((a,b)=> a.fecha.localeCompare(b.fecha) || a.articulo.localeCompare(b.articulo,'es',{sensitivity:'base'}))
              .map(d=>`${d.fecha} · ${d.tipo} · ${d.articulo} (${d.categoria||'-'}) · ${d.cantidad}`)
              .join('; ');
            rows.push([g.dest, g.in, g.out, detalle]);
          }
          downloadCSV(`reporte_por_destino_${state.fromDate}_a_${state.toDate}`, rows);
        };
      }

      // ===== Config =====
      if(state.tab==='config'){
        const btnCfgSeedAll = $("#btnCfgSeedAll");
        btnCfgSeedAll && (btnCfgSeedAll.onclick = ()=>{
          const hasItems = state.items && state.items.length>0;
          if(hasItems && !confirm('Esto reemplazará los ítems actuales por los ítems base en este dispositivo. ¿Continuar?')) return;
          applySeed(); render(); showToast('Ítems base cargados', 'ok', 1800);
        });

        $("#btnBackup").onclick = ()=>{
          const data={ items:state.items, moves:state.moves, dests:state.dests };
          const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
          const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download = `respaldo_inventario_${todayISO()}.json`; a.click(); URL.revokeObjectURL(a.href);
          showToast('Respaldo descargado', 'ok', 1500);
        };
        $("#fileRestore").onchange = e=>{
          const f=e.target.files?.[0]; if(!f) return;
          const reader=new FileReader();
          reader.onload=()=>{
            try{
              const data = JSON.parse(reader.result);
              if(data.items && data.moves){ set({items:data.items, moves:data.moves, dests:data.dests||[]}); showToast('Respaldo cargado', 'ok', 1800); }
              else showToast('Archivo inválido', 'error', 2200);
            }catch{ showToast('No se pudo leer el archivo', 'error', 2200); }
          };
          reader.readAsText(f);
        };

        const btnMakeTransferFile = $("#btnMakeTransferFile");
        const fileTransferImport   = $("#fileTransferImport");

        btnMakeTransferFile && (btnMakeTransferFile.onclick = ()=>{
          try{
            const payload = {
              transferVersion: 1,
              createdAt: new Date().toISOString(),
              items: state.items || [],
              moves: state.moves || [],
              dests: state.dests || [],
              officialDests: getOfficialDests() || []
            };
            const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `transfer_inventario_${(new Date()).toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(a.href);
            showToast('Archivo de transferencia creado', 'ok', 1800);
          }catch(e){
            console.error(e);
            showToast('No se pudo crear el archivo', 'error', 2200);
          }
        });

        fileTransferImport && (fileTransferImport.onchange = (e)=>{
          const f = e.target.files?.[0];
          if (!f) return;
          const reader = new FileReader();
          reader.onload = () => {
            try{
              const data = JSON.parse(reader.result);
              if (data && Array.isArray(data.items) && Array.isArray(data.moves)) {
                set({
                  items: data.items,
                  moves: data.moves,
                  dests: data.dests || state.dests
                });
                if (Array.isArray(data.officialDests)) setOfficialDests(data.officialDests);
                showToast('Transferencia importada', 'ok', 1800);
              } else {
                showToast('Archivo de transferencia inválido', 'error', 2200);
              }
            }catch{
              showToast('No se pudo leer el archivo', 'error', 2200);
            }
          };
          reader.readAsText(f);
        });

        const txtOfficial = $("#txtOfficialDests");
        const btnLoadCur  = $("#btnOfficialLoadFromCurrent");
        const btnSaveOff  = $("#btnOfficialSave");
        const btnApplyOff = $("#btnOfficialApply");
        const btnExpOff   = $("#btnOfficialExportJSON");

        const off = getOfficialDests();
        if (txtOfficial && (!txtOfficial.value || txtOfficial.value.trim()==='') && off.length>0){
          txtOfficial.value = off.join("\n");
        }

        function linesToArray(raw){
          return (raw||'').split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
        }

        btnLoadCur && (btnLoadCur.onclick = ()=>{
          const text = (state.dests||[]).slice().sort((a,b)=>a.localeCompare(b,'es',{sensitivity:'base'})).join('\n');
          txtOfficial.value = text;
          showToast('Cargados destinos actuales', 'ok', 1500);
        });

        btnSaveOff && (btnSaveOff.onclick = ()=>{
          const list = linesToArray(txtOfficial.value);
          if (!list.length) return showToast('Pega la lista oficial', 'error', 2000);
          setOfficialDests(list);
          showToast(`OFICIAL guardada (${list.length})`, 'ok', 1800);
        });

        btnApplyOff && (btnApplyOff.onclick = ()=>{
          const list = getOfficialDests();
          if (!list.length) return showToast('No hay OFICIAL guardada', 'error', 2000);
          set({ dests: unique(list) });
          showToast('OFICIAL aplicada en este dispositivo', 'ok', 1800);
        });

        btnExpOff && (btnExpOff.onclick = ()=>{
          const list = getOfficialDests();
          if (!list.length) return showToast('No hay OFICIAL', 'error', 2000);
          const blob = new Blob([JSON.stringify({officialDests:list}, null, 2)], {type:'application/json'});
          const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='oficial_jardines.json'; a.click(); URL.revokeObjectURL(a.href);
          showToast('OFICIAL descargada', 'ok', 1600);
        });
      }
    }

    // ===== Inventario (pintado parcial) =====
    function fillRemoveSelector(){
      const sel = document.getElementById('selRemoveItem');
      if(!sel) return;
      sel.innerHTML = `<option value="">-- Seleccione ítem a quitar --</option>` +
        state.items.slice().sort((a,b)=>a.name.localeCompare(b.name,'es',{sensitivity:'base'}))
          .map(it=>`<option value="${it.id}">${it.name} · ${it.category}</option>`).join('');
    }

    function renderInventarioRows(){
      const tbody = document.getElementById('inv_rows');
      if(!tbody) return;

      const acc={}; for(const it of state.items) acc[it.id]=Number(it.initialStock||0);
      for(const mv of state.moves){ const m=mv.type==="entrada"?1:-1; acc[mv.itemId]=(acc[mv.itemId]||0)+m*Number(mv.qty||0); }

      const q = (state.buscar||'').trim().toLowerCase();
      const list = state.items.filter(it=>{
        if(state.catFiltro && it.category!==state.catFiltro) return false;
        if(!q) return true;
        return it.name.toLowerCase().includes(q)
            || (it.code||'').toLowerCase().includes(q)
            || (it.unit||'').toLowerCase().includes(q);
      });

      if(list.length===0){
        tbody.innerHTML = `<tr><td colspan='7' class='muted' style='text-align:center;padding:16px'>Sin resultados</td></tr>`;
      }else{
        tbody.innerHTML = list.map(it=>{
          const exist = acc[it.id]||0;
          const danger = exist <= Number(it.minStock||0) ? 'danger' : '';
          return `
            <tr>
              <td>${it.code||''}</td>
              <td>${it.name}</td>
              <td>${it.category}</td>
              <td>${it.unit||''}</td>
              <td>${it.minStock||0}</td>
              <td class='${danger}'>${exist}</td>
              <td class='right'>
                <button class='btn' data-edit-item='${it.id}'>Editar</button>
                <button class='btn bad' data-del-item='${it.id}'>Eliminar</button>
              </td>
            </tr>`;
        }).join('');
      }

      document.querySelectorAll("[data-edit-item]").forEach(btn=>{
        btn.onclick = ()=>{
          const it = state.items.find(x=>x.id===btn.dataset.editItem);
          if(!it) return;
          set({ itemForm:{...it} });
        };
      });
      document.querySelectorAll("[data-del-item]").forEach(btn=>{
        btn.onclick = ()=>{
          if(!confirm("¿Eliminar ítem? Se mantendrán los movimientos históricos.")) return;
          const id = btn.dataset.delItem;
          set({ items: state.items.filter(it=>it.id!==id) });
        };
      });

      fillRemoveSelector();
    }

    // ===== Botones superiores =====
    $("#btnSeedAll").onclick = ()=>{
      const hasItems = state.items && state.items.length>0;
      if(hasItems && !confirm('Esto reemplazará los ítems actuales por los ítems base en este dispositivo. ¿Continuar?')) return;
      applySeed(); render(); showToast('Ítems base cargados', 'ok', 1800);
    };

    $("#btnEjemplo").onclick = ()=>{
      if(!confirm('Esto agregará datos de ejemplo. ¿Continuar?')) return;
      const items=[
        { id:uid(), code:'ASE-001', name:'Detergente multiuso', category:'Artículos de aseo', unit:'Botella', minStock:5, initialStock:20 },
        { id:uid(), code:'EQP-010', name:'Silla ergonómica', category:'Equipamiento', unit:'Unidad', minStock:2, initialStock:10 },
        { id:uid(), code:'IMP-101', name:'Tóner HP 44A', category:'Insumos de impresora', unit:'Unidad', minStock:3, initialStock:8 },
        { id:uid(), code:'DES-200', name:'Leche descremada 1L', category:'Insumos de desayuno', unit:'Caja (12)', minStock:4, initialStock:12 }
      ];
      const idMap = Object.fromEntries(items.map(i=>[i.code,i.id]));
      const moves=[
        { id:uid(), date: todayISO(), type:'salida', itemId:idMap['ASE-001'], qty:3, destType:'Departamento', dest:'Recursos Humanos', notes:'Aseo de oficinas' },
        { id:uid(), date: todayISO(), type:'entrada', itemId:idMap['IMP-101'], qty:5, destType:'Otro', dest:'Proveedor', notes:'Compra mensual' },
        { id:uid(), date: todayISO(), type:'salida', itemId:idMap['DES-200'], qty:2, destType:'Jardín', dest:'Jardín Arcoíris', notes:'Desayuno semanal' },
      ];
      const dests=['Recursos Humanos','Jardín Arcoíris'];
      set({items:[...items, ...state.items], moves:[...moves, ...state.moves], dests: Array.from(new Set([...dests, ...state.dests]))});
      showToast('Ejemplo cargado', 'ok', 1600);
    };

    $("#btnBorrar").onclick = ()=>{ if(confirm('Esto borrará TODO el inventario y movimientos de este dispositivo. ¿Seguro?')){ set({items:[],moves:[],dests:[]}); showToast('Datos borrados', 'ok', 1600); } };

    // ===== Render inicial & restauración desde enlace =====
    render();

    (function restoreFromQuery(){
      try{
        const p=new URLSearchParams(location.search);
        const raw=p.get("data"); if(!raw) return;
        const data=decodeBackup(raw);
        if(data && data.items && data.moves){
          state.items=data.items; state.moves=data.moves; state.dests=data.dests||[];
          if (Array.isArray(data.officialDests)) setOfficialDests(data.officialDests);
          persist();
          showToast('Datos restaurados desde enlace', 'ok', 1800);
        }
      }catch{}
    })();
  })();
  </script>
</body>
</html>
